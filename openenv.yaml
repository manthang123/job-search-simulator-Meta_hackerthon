name: job_search_simulator
version: 1.0.0
description: Realistic job search environment for AI agents

tasks:
  - id: resume_screening
    name: Resume Optimization
    description: Match resume to job description
    difficulty: easy
    max_steps: 10
    
  - id: job_filtering
    name: Smart Job Filtering
    description: Identify legitimate jobs from scams
    difficulty: medium
    max_steps: 25
    
  - id: interview_simulator
    name: Interview Simulation
    description: Answer behavioral questions
    difficulty: hard
    max_steps: 15

observation_space:
  type: dict
  fields:
    current_task: string
    job_description: string
    resume_content: string

action_space:
  type: dict
  fields:
    action_type: string
    content: string

reward_shaping:
  - +0.3 for correct action
  - -0.1 for incorrect action

environment_version: 1.0.0