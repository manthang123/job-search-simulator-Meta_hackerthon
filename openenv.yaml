name: job_search_simulator
version: 1.0.0
description: Realistic job search environment for AI agents

tasks:
  - id: resume_screening
    name: Resume Optimization
    description: Match resume to job description
    difficulty: easy
    max_steps: 10
    
  - id: job_filtering
    name: Smart Job Filtering
    description: Identify legitimate jobs from scams
    difficulty: medium
    max_steps: 25
    
  - id: interview_simulator
    name: Interview Simulation
    description: Answer behavioral questions using STAR method
    difficulty: hard
    max_steps: 15

observation_space:
  type: dict
  fields:
    - current_task
    - job_description
    - resume_content
    - available_jobs
    - interview_question

action_space:
  type: dict
  fields:
    - action_type
    - content
    - selected_jobs

reward_shaping:
  - "+0.3 for correct keyword"
  - "-0.3 for selecting scam job"
  - "+0.25 for STAR method"

environment_version: 1.0.0
